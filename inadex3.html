<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>




 body {
         margin:0;
         height: 100vh;
         background:black;
         overflow: hidden;
      }
      .moon {
         position:absolute;
         width: 120px;
         height: 120px;
         top: 80px;
         left: 70px;
         border-radius: 50%;
         background: radial-gradient(circle at 30% 30%,#fdfdfd,#cfcfcf);
         box-shadow: 0 0 20px rgb(255,255,255);
         animation: glow 3s ease-in-out infinite alternate;
      }
      @keyframes glow{
       from{
        box-shadow: 0 0 20px 50px rgb(255,255,255,);
       }
       to{
        box-shadow: 0px 20px 70px rgb(255,255,255,);
       }
        
    }
       .star {
        position:absolute;
        width: 8px;
        height:8px;
        background: white;
        border-radius: 50%;
        animation:glow2 2s infinite alternate ;
       }
       @keyframes glow2 {
        from{
            opacity: 20%;
            transform: scale(0.8);
        }
        to{
            opacity:1 ;
            transform: scale(1.2);
        }
       }

    </style>
    <div class="moon"></div>
         <div class="star" style="top: 50px;
         left:100px"></div>
           
         <div class="star" style="top: 150px;
        left:300px"></div>


        <div class="star" style="top: 200px;
        left:600px"></div>


         <div class="star" style="top: 300px;
         left:700px"></div>


        <div class="star" style="top: 350px;
        left:750px"></div>

        <div class="star" style="top: 400px;
         left:800px"></div>

        <div class="star" style="top: 450px;
        left:800px"></div>
        <br>
         
     
</div>
</body>
</html>

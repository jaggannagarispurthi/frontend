        @keyframes glow {
          from{

          }

            box-shadow: 2px 2px 20px 50px rgb(white);
          }
          
        } 


       
      h2 {
        background: linear-gradient(45deg,pink,rgb(231, 142, 79),rgb(137, 205, 247),rgb(245, 128, 192));
        padding: 10px;
        margin: 20px;
        border-radius: 10px;
        background-size: 100% 100%;
        animation: suprise 4s ease infinite;
      }
      @keyframes suprise{
        0%{
          border-radius: 0% 50%;
        }
        50%{
          border-radius: 100% 50%;
        }
        100%{
          border-radius: 0% 50%;
        }
      }
